name: Publish database

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 4,6

jobs:
  get-dbs:
    name: GetDBs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
#      - name: Get GeoLite2Country DB
#        run: |
#          wget -qO- "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${{ secrets.GEOLITE2DB_LICENSEKEY }}&suffix=tar.gz" | tar zx --strip-components=1 --wildcards "*/GeoLite2-Country.mmdb"
#
#      - name: Get GeoLite2ASN DB
#        run: |
#          wget -qO- "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN&license_key=${{ secrets.GEOLITE2DB_LICENSEKEY }}&suffix=tar.gz" | tar zx --strip-components=1 --wildcards "*/GeoLite2-ASN.mmdb"

      - name: Get IPFire DB
        run: |
          wget -qO- "https://location.ipfire.org/databases/1/location.db.xz" | unxz > IPFire.db

#      - name: Get IP2LocationCountry DB
#        run: |
#          wget -qO- "https://www.ip2location.com/download/?token=${{ secrets.GEOLITE2DB_LICENSEKEY }}&file=DB1LITEBIN" | jar x "IP2LOCATION-LITE-DB1.BIN"
#
#      - name: Get IP2LocationASN DB
#        run: |
#          wget -qO- "https://www.ip2location.com/download/?token=${{ secrets.GEOLITE2DB_LICENSEKEY }}&file=DBASNLITEBIN" | jar x "IP2LOCATION-LITE-ASN.BIN"

      - name: Push DBs to "sources" branch
        run: |
          git init -b main
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git pull
          git checkout sources 2>/dev/null || git checkout -b sources
          git add .
          git commit -m "update_$(date +"%Y.%m.%d")"
          git push origin sources

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 3
