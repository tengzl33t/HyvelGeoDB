name: Get IPFireDBs

on:
  workflow_dispatch:
  schedule:
    - cron: 0 4 * * *

permissions:
  contents: write
  actions: write

jobs:
  get-if-dbs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: sources

      - name: Get IPFire DB
        run: |
          wget -qO- "https://location.ipfire.org/databases/1/location.db.xz" | unxz > IPFire.db

      - name: Commit changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add IPFire.db
          git commit -a -m "update_$(date +"%Y.%m.%d")"
          git push
